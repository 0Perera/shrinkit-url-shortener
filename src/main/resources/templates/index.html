<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShrinkIt</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="min-h-screen bg-gray-700 flex flex-col items-center justify-center p-4">
    <div class="text-center mb-8">
        <h1 class="text-5xl sm:text-7xl md:text-8xl font-extrabold bg-gradient-to-r from-green-400 to-emerald-600 bg-clip-text text-transparent" style="font-family: 'Plus Jakarta Sans', sans-serif;">ShrinkIt</h1>
        <p class="mt-3 text-base sm:text-lg md:text-xl text-gray-300">Encurte links longos em segundos.</p>
    </div>

<main class="w-full max-w-2xl">

    <div class="rounded-2xl border-2 border-green-500 bg-gray-800 p-6 sm:p-8 md:p-10 shadow-xl">
        <form id="shorten-form" class="flex overflow-hidden rounded-full bg-white shadow-lg focus-within:ring-4 focus-within:ring-green-300">
            <input
                id="url-input"
                type="text"
                name="url"
                placeholder="Cole seu link aqui..."
                class="flex-1 min-w-0 px-4 sm:px-5 py-3 text-sm sm:text-base text-slate-700 outline-none"
                required
            >
            <button
                id="submit-button"
                type="submit"
                class="m-1 shrink-0 rounded-full bg-green-600 px-4 sm:px-6 text-sm sm:text-base font-semibold text-white hover:bg-green-700 transition disabled:opacity-60 disabled:cursor-not-allowed"
            >
                Encurtar
            </button>
        </form>
    </div>

    <div id="result-panel" class="hidden mt-6 flex items-center justify-between gap-3 rounded-full border border-green-500 bg-white p-3 pl-4 sm:pl-6 shadow-lg">
        <div class="flex items-center gap-3 min-w-0">
            <span class="h-3 w-3 flex-shrink-0 rounded-full bg-green-500"></span>
            <a id="result-link" href="#" target="_blank" rel="noopener noreferrer" aria-label="Link encurtado" class="truncate text-base sm:text-lg font-medium text-green-700 hover:underline"></a>
        </div>
        <button id="copy-button" class="flex-shrink-0 rounded-full bg-slate-800 px-4 sm:px-5 py-3 text-sm sm:text-base font-medium text-white hover:bg-slate-700 transition">
            Copiar
        </button>
    </div>
    <p id="result-error" class="hidden mt-4 text-center text-sm sm:text-base font-medium text-red-600 bg-red-50 border border-red-200 rounded-full px-5 py-3"></p>
</main>

<script th:src="@{/js/shorten.js}"></script>
</body>
</html>
